name: Prettier code formatter

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    # available images: https://github.com/actions/runner-images#available-images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
      - name: Install Prettier 💾
        run: npm install --save-dev --save-exact prettier @shopify/prettier-plugin-liquid
      - name: Prettier Check 🔎
        id: prettier
        continue-on-error: true
        run: npx prettier . --check
      - name: Create diff 📝
        if: ${{ steps.prettier.outcome == 'failure' }}
        run: |
          npx prettier . --write
          git diff -- . ':(exclude)package-lock.json' ':(exclude)package.json' > diff.txt
          npm install -g diff2html-cli
          diff2html -i file -s side -F diff.html -- diff.txt
      - name: Check for formatting changes
        id: formatting
        if: ${{ steps.prettier.outcome == 'failure' }}
        run: |
          if git diff --quiet -- . ':(exclude)package-lock.json' ':(exclude)package.json'; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      - name: Upload html diff ⬆️
        id: artifact-upload
        if: ${{ steps.prettier.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: HTML Diff
          path: diff.html
          retention-days: 7
      - name: Create pull request for formatting changes
        if: ${{ steps.prettier.outcome == 'failure' && steps.formatting.outputs.changed == 'true' && github.event_name != 'pull_request' }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "style: format files with Prettier"
          title: "style: format files with Prettier"
          body: |
            This pull request applies automated formatting changes generated by Prettier.
          branch: "auto/prettier-format"
          delete-branch: true
          labels: "automation"
      - name: Dispatch information to repository 🗣️
        if: ${{ steps.prettier.outcome == 'failure' && github.event_name == 'pull_request' }}
        uses: peter-evans/repository-dispatch@v2
        with:
          event-type: prettier-failed-on-pr
          client-payload: '{"pr_number": "${{ github.event.number }}", "artifact_url": "${{ steps.artifact-upload.outputs.artifact-url }}", "run_id": "${{ github.run_id }}"}'
